<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

      <!-- Cámara -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- Banda transportadora -->
      <a-entity position="0 0 -5">

        <!-- Marco negro -->
        <a-box position="0 0.5 0" width="10" height="1" depth="2" color="black"></a-box>

        <!-- Banda gris -->
        <a-box position="0 0.7 0" width="9.5" height="0.5" depth="1.4" color="#BFBFBF"></a-box>

        <!-- Superficie -->
        <a-box position="0 0.95 0" width="9" height="0.05" depth="1.4" color="#222222"></a-box>

        <!-- Rodillos -->
        <a-cylinder position="-4.8 0.7 0" radius="0.5" height="1.6" rotation="90 0 0" color="yellow"></a-cylinder>
        <a-cylinder position="4.8 0.7 0" radius="0.5" height="1.6" rotation="90 0 0" color="yellow"></a-cylinder>

        <!-- Cajas -->
        <a-box position="-3 2 0" width="1.5" height="1.5" depth="1.2" color="red"></a-box>
        <a-box position="0 2 0" width="1.5" height="1.5" depth="1.2" color="red"></a-box>
        <a-box position="3 2 0" width="1.5" height="1.5" depth="1.2" color="red"></a-box>

      </a-entity>

    </a-scene>

  </body>
</html>
