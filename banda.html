<!DOCTYPE html> 
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Piso -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#555555"></a-plane>

      <!-- 🔧 Base de la banda (bajada, ahora apoyada) -->
      <a-box position="0 0.1 -5" width="8" height="0.2" depth="1.5" color="#888888"></a-box>

      <!-- 🟡 Rodillo izquierdo -->
      <a-cylinder 
        position="-3.5 0.6 -5"
        radius="0.15"
        height="1.4"
        rotation="90 0 0"
        color="#FFC65D">
      </a-cylinder>

      <!-- 🟡 Rodillo derecho -->
      <a-cylinder 
        position="3.5 0.6 -5"
        radius="0.15"
        height="1.4"
        rotation="90 0 0"
        color="#FFC65D">
      </a-cylinder>

      <!-- Banda transportadora -->
      <a-box position="0 0.85 -5" width="7" height="0.05" depth="1.4" color="#222222"></a-box>

      <!-- Productos -->
      <a-box position="-2 1.1 -5" width="0.5" height="0.5" depth="0.5" color="#EF2D5E"></a-box>
      <a-box position="0 1.1 -5" width="0.5" height="0.5" depth="0.5" color="#EF2D5E"></a-box>
      <a-box position="2 1.1 -5" width="0.5" height="0.5" depth="0.5" color="#EF2D5E"></a-box>

      <!-- Sensores -->
      <a-sphere position="-3.5 1.3 -5" radius="0.15" color="#4CC3D9"></a-sphere>
      <a-sphere position="3.5 1.3 -5" radius="0.15" color="#4CC3D9"></a-sphere>

      <!-- Cielo -->
      <a-sky color="#ECECEC"></a-sky>

    </a-scene>
  </body>
</html>
