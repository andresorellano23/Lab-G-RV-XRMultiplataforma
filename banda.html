<!DOCTYPE html> 
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Cámara -->
      <a-camera position="0 3 8"></a-camera>

      <!-- Luces -->
      <a-light type="directional" position="2 4 3" intensity="1"></a-light>
      <a-light type="ambient" intensity="0.4"></a-light>

      <!-- Piso -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#DDDDDD"></a-plane>

      <!-- Marco negro -->
      <a-box position="0 0.5 -5" width="10" height="1" depth="2" color="black"></a-box>

      <!-- Banda gris (estructura) -->
      <a-box position="0 0.7 -5" width="9.5" height="0.5" depth="1.4" color="#BFBFBF"></a-box>

      <!-- Superficie de la banda -->
      <a-box position="0 0.95 -5" width="9" height="0.05" depth="1.4" color="#222222"></a-box>

      <!-- Rodillo izquierdo -->
      <a-cylinder 
        position="-4.8 0.7 -5"
        radius="0.5"
        height="1.6"
        rotation="90 0 0"
        color="yellow">
      </a-cylinder>

      <!-- Línea rodillo izquierdo -->
      <a-box position="-4.8 0.7 -5" width="0.1" height="0.1" depth="1.6" color="black"></a-box>

      <!-- Rodillo derecho -->
      <a-cylinder 
        position="4.8 0.7 -5"
        radius="0.5"
        height="1.6"
        rotation="90 0 0"
        color="yellow">
      </a-cylinder>

      <!-- Línea rodillo derecho -->
      <a-box position="4.8 0.7 -5" width="0.1" height="0.1" depth="1.6" color="black"></a-box>

      <!-- Cajas rojas con profundidad -->
      <a-box position="-3 2 -5" width="1.5" height="1.5" depth="1.2" color="red"></a-box>

      <a-box position="0 2 -5" width="1.5" height="1.5" depth="1.2" color="red"></a-box>

      <a-box position="3 2 -5" width="1.5" height="1.5" depth="1.2" color="red"></a-box>

      <!-- Cielo -->
      <a-sky color="#ECECEC"></a-sky>

    </a-scene>
  </body>
</html>
