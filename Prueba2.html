<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR Banda</title>

  <!-- Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="BandaOpcion3V2.glb"
  alt="Modelo Banda"
  auto-rotate
  camera-controls
  ar
  ar-modes="webxr scene-viewer quick-look"
  shadow-intensity="1"
  exposure="1"
>
</model-viewer>

</body>
</html>
